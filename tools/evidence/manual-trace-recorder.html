<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Manual Editor Trace Recorder</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #f8f7f4;
        color: #1d1b18;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      main {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(280px, 380px);
        gap: 18px;
        width: min(100%, 1180px);
        margin: 0 auto;
        padding: 24px 18px 48vh;
      }

      h1 {
        grid-column: 1 / -1;
        margin: 0;
        font-size: 1.45rem;
        line-height: 1.25;
      }

      form {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        grid-column: 1 / -1;
      }

      label {
        display: grid;
        gap: 5px;
        color: #6b6258;
        font-size: 0.75rem;
        font-weight: 720;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      input,
      select,
      textarea,
      button {
        font: inherit;
      }

      input,
      select,
      textarea {
        width: 100%;
        border: 1px solid #d8d4cc;
        border-radius: 6px;
        background: #fffdfa;
        color: #28231d;
        padding: 8px 10px;
      }

      textarea {
        min-height: 64px;
        resize: vertical;
      }

      .editor {
        min-height: 68vh;
        outline: 0;
        border-radius: 6px;
        background: #fffdfa;
        padding: 22px;
        color: #28231d;
        font-size: 1.06rem;
        line-height: 1.7;
        white-space: pre-wrap;
      }

      .editor:focus,
      .editor:focus-visible {
        box-shadow: inset 0 0 0 2px rgb(36 89 197 / 28%);
      }

      .atom {
        display: inline-flex;
        border-radius: 6px;
        background: #e9eef8;
        color: #1d3f7a;
        padding: 0 0.28em;
        white-space: nowrap;
      }

      .block-atom {
        border-radius: 6px;
        background: #eeeae1;
        padding: 10px 12px;
      }

      .panel {
        display: grid;
        align-content: start;
        gap: 10px;
        min-width: 0;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      button {
        border: 1px solid #d8d4cc;
        border-radius: 6px;
        background: #fffdfa;
        color: #28231d;
        padding: 8px 12px;
      }

      button:hover {
        background: #f0ede7;
      }

      pre {
        overflow: auto;
        max-height: 58vh;
        margin: 0;
        border-radius: 6px;
        background: #eeeae1;
        padding: 12px;
        font-family: "SFMono-Regular", Consolas, monospace;
        font-size: 0.76rem;
        line-height: 1.45;
        white-space: pre-wrap;
      }

      .status {
        min-height: 1.4em;
        margin: 0;
        color: #4c453d;
      }

      .full {
        grid-column: 1 / -1;
      }

      @media (max-width: 820px) {
        main,
        form {
          grid-template-columns: 1fr;
        }

        h1,
        form {
          grid-column: auto;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Manual Editor Trace Recorder</h1>
      <form id="metadata">
        <label>
          Issue
          <select id="issue">
            <option value="85">85 replacement/autocorrect</option>
            <option value="70">70 touch selection</option>
            <option value="72">72 enter/backspace boundary</option>
            <option value="78">78 viewport/caret</option>
            <option value="81">81 iOS BIU menu</option>
          </select>
        </label>
        <label>
          Scenario
          <select id="scenario"></select>
        </label>
        <label>
          Device
          <input id="device" placeholder="iPhone, Pixel, MacBook..." />
        </label>
        <label>
          OS
          <input id="os" />
        </label>
        <label>
          Browser
          <input id="browser" />
        </label>
        <label>
          Keyboard
          <input id="keyboard" placeholder="iOS keyboard, Gboard..." />
        </label>
        <label>
          Locale
          <input id="locale" />
        </label>
        <label>
          Classification
          <input id="classification" placeholder="native text replacement" />
        </label>
        <label>
          Native DOM effect
          <input id="nativeDomEffect" />
        </label>
        <label>
          Command result
          <input id="commandResult" />
        </label>
        <label>
          History unit
          <input id="historyUnit" />
        </label>
        <label>
          Undo result
          <input id="undoResult" />
        </label>
        <label class="full">
          Notes
          <textarea id="notes"></textarea>
        </label>
      </form>
      <div
        id="editor"
        class="editor"
        contenteditable="true"
        spellcheck="true"
        autocorrect="on"
      >
        <p>
          Plain text with <strong>bold target</strong>,
          <em>italic target</em>, <u>underline target</u>,
          <a href="https://example.com/link">link label</a>,
          <code>code target</code>, and
          <span class="atom" contenteditable="false" data-atom="mention"
            >@Ada</span
          >.
        </p>
        <p>Second paragraph boundary target.</p>
        <ul>
          <li>List item one</li>
          <li><br /></li>
        </ul>
        <div class="block-atom" contenteditable="false" data-block-atom="media">
          Block atom or media boundary
        </div>
        <p style="margin-top: 42vh">
          Bottom viewport caret target for virtual keyboard traces.
        </p>
      </div>
      <section class="panel">
        <div class="actions">
          <button id="clear" type="button">Clear</button>
          <button id="mark" type="button">Mark Snapshot</button>
          <button id="copy" type="button">Copy JSON</button>
          <button id="download" type="button">Download JSON</button>
        </div>
        <p class="status" id="status"></p>
        <pre id="output">{}</pre>
      </section>
    </main>
    <script>
      const scenariosByIssue = {
        70: ["ios-touch-selection", "android-touch-selection"],
        72: [
          "ios-enter-backspace-boundary",
          "android-enter-backspace-boundary",
        ],
        78: [
          "ios-keyboard-viewport-caret",
          "android-keyboard-viewport-caret",
          "android-webview-keyboard-viewport-caret",
        ],
        81: ["ios-biu-native-formatting", "ios-biu-boundary-safety"],
        85: ["macos-text-replacement-acceptance", "ios-autocorrect-prediction"],
      };

      const editor = document.querySelector("#editor");
      const issueInput = document.querySelector("#issue");
      const scenarioInput = document.querySelector("#scenario");
      const output = document.querySelector("#output");
      const statusOutput = document.querySelector("#status");
      const eventLog = [];
      const snapshots = [];

      document.querySelector("#browser").value = navigator.userAgent;
      document.querySelector("#os").value = navigator.platform;
      document.querySelector("#locale").value =
        navigator.language || navigator.languages?.[0] || "";

      issueInput.addEventListener("change", syncScenarios);
      document
        .querySelector("#metadata")
        .addEventListener("input", updateOutput);
      syncScenarios();

      for (const type of [
        "keydown",
        "keyup",
        "beforeinput",
        "input",
        "compositionstart",
        "compositionupdate",
        "compositionend",
        "selectionchange",
        "select",
        "pointerdown",
        "pointerup",
        "touchstart",
        "touchend",
        "focus",
        "blur",
        "paste",
        "copy",
        "cut",
      ]) {
        document.addEventListener(type, recordEvent, true);
      }

      if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", () =>
          recordSynthetic("visualViewport.resize"),
        );
        window.visualViewport.addEventListener("scroll", () =>
          recordSynthetic("visualViewport.scroll"),
        );
      }
      window.addEventListener("resize", () => recordSynthetic("window.resize"));
      window.addEventListener("scroll", () => recordSynthetic("window.scroll"));

      document.querySelector("#clear").addEventListener("click", () => {
        eventLog.length = 0;
        snapshots.length = 0;
        updateOutput();
      });

      document.querySelector("#mark").addEventListener("click", () => {
        snapshots.push(snapshot("manual"));
        updateOutput();
      });

      document.querySelector("#copy").addEventListener("click", async () => {
        await navigator.clipboard.writeText(output.textContent);
        statusOutput.textContent = "JSON copied.";
      });

      document.querySelector("#download").addEventListener("click", () => {
        const trace = buildTrace();
        const blob = new Blob([`${JSON.stringify(trace, null, 2)}\n`], {
          type: "application/json",
        });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `issue-${trace.issue}-${trace.scenario}.json`;
        link.click();
        URL.revokeObjectURL(link.href);
      });

      function syncScenarios() {
        scenarioInput.replaceChildren(
          ...scenariosByIssue[issueInput.value].map((scenario) => {
            const option = document.createElement("option");
            option.value = scenario;
            option.textContent = scenario;
            return option;
          }),
        );
        updateOutput();
      }

      function recordSynthetic(type) {
        eventLog.push({
          at: Math.round(performance.now()),
          type,
          snapshot: snapshot(type),
        });
        trimLog();
        updateOutput();
      }

      function recordEvent(event) {
        eventLog.push({
          at: Math.round(performance.now()),
          type: event.type,
          key: "key" in event ? event.key : undefined,
          code: "code" in event ? event.code : undefined,
          inputType: "inputType" in event ? event.inputType : undefined,
          data: "data" in event ? event.data : undefined,
          isComposing: "isComposing" in event ? event.isComposing : undefined,
          defaultPrevented: event.defaultPrevented,
          cancelable: event.cancelable,
          clipboardTypes:
            "clipboardData" in event && event.clipboardData
              ? Array.from(event.clipboardData.types)
              : undefined,
          targetRanges:
            typeof event.getTargetRanges === "function"
              ? Array.from(event.getTargetRanges()).map(serializeRange)
              : undefined,
          snapshot: snapshot(event.type),
        });
        trimLog();
        updateOutput();
      }

      function trimLog() {
        if (eventLog.length > 500) {
          eventLog.splice(0, eventLog.length - 500);
        }
      }

      function snapshot(reason) {
        return {
          reason,
          activeElement: describeNode(document.activeElement),
          editorText: editor.innerText,
          editorHtml: editor.innerHTML,
          selection: serializeSelection(),
          visualViewport: serializeVisualViewport(),
          layoutViewport: {
            innerWidth: window.innerWidth,
            innerHeight: window.innerHeight,
            scrollX: window.scrollX,
            scrollY: window.scrollY,
          },
          caretRect: serializeCaretRect(),
        };
      }

      function serializeSelection() {
        const selection = window.getSelection();
        if (!selection || selection.rangeCount === 0) {
          return null;
        }
        return {
          anchorNode: describeNode(selection.anchorNode),
          anchorOffset: selection.anchorOffset,
          focusNode: describeNode(selection.focusNode),
          focusOffset: selection.focusOffset,
          isCollapsed: selection.isCollapsed,
          ranges: Array.from({ length: selection.rangeCount }, (_, index) =>
            serializeRange(selection.getRangeAt(index)),
          ),
          text: selection.toString(),
        };
      }

      function serializeRange(range) {
        const rect = range.getBoundingClientRect();
        return {
          startContainer: describeNode(range.startContainer),
          startOffset: range.startOffset,
          endContainer: describeNode(range.endContainer),
          endOffset: range.endOffset,
          collapsed: range.collapsed,
          rect: serializeRect(rect),
        };
      }

      function serializeCaretRect() {
        const selection = window.getSelection();
        if (!selection || selection.rangeCount === 0) {
          return null;
        }
        const range = selection.getRangeAt(0).cloneRange();
        range.collapse(false);
        const rect = range.getBoundingClientRect();
        return serializeRect(rect);
      }

      function serializeVisualViewport() {
        if (!window.visualViewport) {
          return null;
        }
        return {
          width: window.visualViewport.width,
          height: window.visualViewport.height,
          offsetLeft: window.visualViewport.offsetLeft,
          offsetTop: window.visualViewport.offsetTop,
          pageLeft: window.visualViewport.pageLeft,
          pageTop: window.visualViewport.pageTop,
          scale: window.visualViewport.scale,
        };
      }

      function serializeRect(rect) {
        return {
          x: rect.x,
          y: rect.y,
          width: rect.width,
          height: rect.height,
          top: rect.top,
          right: rect.right,
          bottom: rect.bottom,
          left: rect.left,
        };
      }

      function describeNode(node) {
        if (!node) {
          return null;
        }
        if (node.nodeType === Node.TEXT_NODE) {
          return {
            type: "text",
            text: node.textContent?.slice(0, 80) ?? "",
            path: nodePath(node),
          };
        }
        if (node instanceof Element) {
          return {
            type: "element",
            tag: node.tagName.toLowerCase(),
            id: node.id || undefined,
            className: node.className || undefined,
            contentEditable: node.getAttribute("contenteditable") ?? undefined,
            atom: node.getAttribute("data-atom") ?? undefined,
            blockAtom: node.getAttribute("data-block-atom") ?? undefined,
            path: nodePath(node),
          };
        }
        return {
          type: `node-${node.nodeType}`,
          path: nodePath(node),
        };
      }

      function nodePath(node) {
        const parts = [];
        let current = node;
        while (current && current !== document) {
          const parent = current.parentNode;
          const index = parent ? Array.from(parent.childNodes).indexOf(current) : 0;
          parts.push(index);
          current = parent;
        }
        return parts.reverse().join("/");
      }

      function buildTrace() {
        return {
          schema: "interactive-os.manual-editor-trace@1",
          issue: Number(issueInput.value),
          scenario: scenarioInput.value,
          source: {
            device: valueOf("#device"),
            os: valueOf("#os"),
            browser: valueOf("#browser"),
            keyboard: valueOf("#keyboard"),
            locale: valueOf("#locale"),
            capturedWith: "tools/evidence/manual-trace-recorder.html",
          },
          events: eventLog,
          snapshots: {
            manual: snapshots,
            final: snapshot("final"),
          },
          assertions: {
            classification: valueOf("#classification"),
            nativeDomEffect: valueOf("#nativeDomEffect"),
            commandResult: valueOf("#commandResult"),
            historyUnit: valueOf("#historyUnit"),
            undoResult: valueOf("#undoResult"),
          },
          notes: valueOf("#notes")
            .split("\n")
            .map((line) => line.trim())
            .filter(Boolean),
        };
      }

      function valueOf(selector) {
        return document.querySelector(selector).value;
      }

      function updateOutput() {
        output.textContent = JSON.stringify(buildTrace(), null, 2);
        statusOutput.textContent = `${eventLog.length} events, ${snapshots.length} manual snapshots`;
      }

      updateOutput();
    </script>
  </body>
</html>
